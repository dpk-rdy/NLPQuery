<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryNLP - Natural Language to SQL</title>
    <meta name="description"
        content="An advanced NL-to-SQL MCP Server. Chat with your SQLite, PostgreSQL, and MySQL databases directly and generate interactive Chart.js visualizations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rb-navy: #060d1e;
            --rb-dark: #0a1128;
            --rb-blue: #1e3a5f;
            --rb-red: #dc0000;
            --rb-red-glow: #ff2d2d;
            --rb-yellow: #ffd700;
            --rb-white: #eaeaea;
            --rb-gray: #8899aa;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--rb-navy);
            color: var(--rb-white);
            overflow: hidden;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── CANVAS LAYER ── */
        #bgCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── RACING STRIPES ── */
        .stripe {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 5px;
            z-index: 9999;
            pointer-events: none;
        }

        .stripe-l {
            left: 0;
            background: linear-gradient(180deg, var(--rb-red), var(--rb-yellow), var(--rb-red));
            box-shadow: 0 0 20px var(--rb-red);
        }

        .stripe-r {
            right: 0;
            background: linear-gradient(180deg, var(--rb-yellow), var(--rb-red), var(--rb-yellow));
            box-shadow: 0 0 20px var(--rb-yellow);
        }

        /* ── MAIN WRAPPER ── */
        .scene {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px 80px;
            text-align: center;
            gap: 0;
            overflow-y: auto;
        }

        /* Ensure body allows scroll if content is taller than viewport */
        body {
            overflow-y: auto !important;
        }

        /* ── TEAM BADGE (top) ── */
        .team-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.45rem, 1.5vw, 0.65rem);
            letter-spacing: 8px;
            color: var(--rb-yellow);
            padding: 8px 32px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            background: rgba(255, 215, 0, 0.06);
            margin-bottom: 40px;
            animation: fadeSlideDown 0.8s ease-out 0.2s both;
            text-transform: uppercase;
        }

        /* ── CHECKERED FLAG ── */
        .flag-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeSlideDown 0.8s ease-out 0.4s both;
        }

        .checkered {
            width: 56px;
            height: 36px;
            background-image:
                linear-gradient(45deg, #fff 25%, transparent 25%),
                linear-gradient(-45deg, #fff 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #fff 75%),
                linear-gradient(-45deg, transparent 75%, #fff 75%);
            background-size: 10px 10px;
            background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
            border-radius: 4px;
            opacity: 0.7;
            animation: flagWave 2s ease-in-out infinite alternate;
        }

        @keyframes flagWave {
            from {
                transform: perspective(200px) rotateY(-8deg) scale(1);
            }

            to {
                transform: perspective(200px) rotateY(8deg) scale(1.04);
            }
        }

        .flag-label {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.55rem, 1.8vw, 0.8rem);
            letter-spacing: 6px;
            color: var(--rb-gray);
            font-weight: 700;
        }

        /* ── RACE TELEMETRY DASH ── */
        .telemetry-dash {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 22px;
            animation: fadeSlideDown 0.8s ease-out 0.5s both;
            width: 100%;
            max-width: 450px;
        }

        .dash-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .dash-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dash-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: var(--rb-gray);
            font-weight: 600;
        }

        .dash-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            color: var(--rb-white);
        }

        .dash-value.p1 {
            color: var(--rb-yellow);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .dash-footer-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--rb-gray);
            font-style: italic;
            opacity: 0.8;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.2
            }
        }

        /* ── BIRTHDAY HEADING ── */
        .birthday-pre {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.6rem, 2vw, 0.9rem);
            letter-spacing: 10px;
            color: var(--rb-gray);
            text-transform: uppercase;
            margin-bottom: 24px;
            animation: fadeSlideDown 0.8s ease-out 0.6s both;
        }

        .birthday-main {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.4rem, 8vw, 5.5rem);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 40px;
            animation: fadeSlideDown 0.9s ease-out 0.7s both;
        }

        .birthday-main .happy {
            display: block;
            background: linear-gradient(135deg, var(--rb-yellow) 0%, #ffaa00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 24px rgba(255, 215, 0, 0.4));
        }

        .birthday-main .bday {
            display: block;
            background: linear-gradient(135deg, var(--rb-red) 0%, var(--rb-red-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(220, 0, 0, 0.5));
        }

        /* ── RACE NUMBER 26 ── */
        .race-number-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
            animation: fadeSlideDown 0.9s ease-out 0.8s both;
        }

        .race-number {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(4rem, 18vw, 11rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--rb-yellow) 0%, var(--rb-red) 60%, #ff6600 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(220, 0, 0, 0.5)) drop-shadow(0 0 80px rgba(255, 215, 0, 0.2));
            animation: numberPulse 2.5s ease-in-out infinite;
        }

        @keyframes numberPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 40px rgba(220, 0, 0, 0.5)) drop-shadow(0 0 80px rgba(255, 215, 0, 0.2));
            }

            50% {
                filter: drop-shadow(0 0 60px rgba(220, 0, 0, 0.8)) drop-shadow(0 0 120px rgba(255, 215, 0, 0.4));
            }
        }

        .race-number-label {
            position: absolute;
            bottom: -4px;
            right: -8px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.45rem, 1.4vw, 0.6rem);
            letter-spacing: 2px;
            color: var(--rb-gray);
            background: var(--rb-navy);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* ── NAME ── */
        .name-line {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.1rem, 4vw, 2.4rem);
            font-weight: 800;
            letter-spacing: 12px;
            color: var(--rb-white);
            margin-bottom: 18px;
            animation: fadeSlideDown 0.9s ease-out 0.9s both;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* ── MAX QUOTE ── */
        .max-quote {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.8rem, 2.5vw, 1.1rem);
            color: rgba(234, 234, 234, 0.6);
            letter-spacing: 2px;
            margin-bottom: 55px;
            font-style: italic;
            animation: fadeSlideDown 0.9s ease-out 1s both;
        }

        .max-quote span {
            color: var(--rb-yellow);
            font-style: normal;
            font-weight: 700;
        }

        /* ── PODIUM TROPHIES ── */
        .podium-row {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 25px;
            margin-bottom: 60px;
            animation: fadeSlideDown 0.9s ease-out 1.1s both;
        }

        .podium-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .podium-emoji {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
        }

        .podium-bar {
            width: clamp(52px, 14vw, 80px);
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .podium-1 .podium-bar {
            height: clamp(54px, 12vw, 80px);
            background: linear-gradient(180deg, #ffd700, #b8860b);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .podium-2 .podium-bar {
            height: clamp(38px, 9vw, 58px);
            background: linear-gradient(180deg, #c0c0c0, #707070);
        }

        .podium-3 .podium-bar {
            height: clamp(28px, 7vw, 44px);
            background: linear-gradient(180deg, #cd7f32, #7a4817);
        }

        .podium-num {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.6rem, 2vw, 0.85rem);
            font-weight: 800;
            color: var(--rb-navy);
        }

        .podium-tag {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.5rem, 1.5vw, 0.7rem);
            letter-spacing: 1px;
            color: var(--rb-gray);
            text-align: center;
            max-width: clamp(52px, 14vw, 80px);
        }

        /* ── CTA BUTTON ── */
        .cta-wrap {
            animation: fadeSlideUp 0.9s ease-out 1.3s both;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.55rem, 1.8vw, 0.75rem);
            font-weight: 700;
            letter-spacing: 3px;
            padding: clamp(12px, 3vw, 16px) clamp(24px, 6vw, 48px);
            border: 2px solid var(--rb-red);
            border-radius: 8px;
            color: var(--rb-white);
            background: rgba(220, 0, 0, 0.12);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(220, 0, 0, 0.35), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .cta-btn:hover::before {
            transform: translateX(100%);
        }

        .cta-btn:hover {
            background: rgba(220, 0, 0, 0.25);
            box-shadow: 0 0 40px rgba(220, 0, 0, 0.5), 0 0 80px rgba(220, 0, 0, 0.2);
            transform: translateY(-3px) scale(1.02);
        }

        .cta-btn svg {
            width: clamp(16px, 4vw, 22px);
            height: clamp(16px, 4vw, 22px);
            flex-shrink: 0;
        }

        /* ── RB LOGO MARK ── */
        .rb-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 18px;
            opacity: 0.4;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.45rem, 1.2vw, 0.55rem);
            letter-spacing: 3px;
            color: var(--rb-gray);
            animation: fadeSlideUp 0.9s ease-out 1.5s both;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── DESKTOP FIT — prevent btn going below fold ── */
        /* Smooth proportional scaling for shorter screens */
        @media (min-width: 601px) and (max-height: 950px) {
            .scene {
                padding: min(20px, 2.5vh) 24px;
            }

            .team-badge {
                margin-bottom: min(16px, 2vh);
                padding: 5px 18px;
            }

            .flag-row {
                margin-bottom: min(14px, 1.8vh);
            }

            .lap-badge {
                margin-bottom: min(16px, 2vh);
                padding: 6px 18px;
            }

            .birthday-pre {
                margin-bottom: min(6px, 0.8vh);
            }

            .birthday-main {
                margin-bottom: min(8px, 1vh);
                font-size: clamp(2.4rem, 5vh + 3vw, 4.5rem);
            }

            .race-number-wrap {
                margin-bottom: min(10px, 1.2vh);
            }

            .race-number {
                font-size: clamp(4rem, 10vh + 6vw, 8.5rem);
            }

            .name-line {
                margin-bottom: min(6px, 0.8vh);
            }

            .max-quote {
                margin-bottom: min(16px, 2vh);
            }

            .podium-row {
                margin-bottom: min(18px, 2.5vh);
            }
        }

        /* ── MOBILE (≤ 600px) ── */
        @media (max-width: 600px) {
            .scene {
                padding: 20px 18px 32px;
                justify-content: flex-start;
                padding-top: max(20px, env(safe-area-inset-top, 20px));
            }

            /* Badge */
            .team-badge {
                font-size: 0.42rem;
                letter-spacing: 3px;
                padding: 5px 14px;
                margin-bottom: 14px;
            }

            /* Flags row — smaller flags, less gap */
            .flag-row {
                gap: 10px;
                margin-bottom: 12px;
            }

            .checkered {
                width: 36px;
                height: 24px;
            }

            .flag-label {
                font-size: 0.55rem;
                letter-spacing: 2px;
            }

            /* Telemetry Dash */
            .telemetry-dash {
                margin-bottom: 15px;
                max-width: 280px;
                gap: 10px;
            }

            .dash-main {
                padding: 8px 15px;
                gap: 15px;
                border-radius: 20px;
            }

            .dash-value {
                font-size: 0.8rem;
            }

            .dash-label {
                font-size: 0.45rem;
                letter-spacing: 1px;
            }

            .birthday-pre {
                font-size: 0.45rem;
                letter-spacing: 4px;
                margin-bottom: 5px;
            }

            /* HAPPY BIRTHDAY */
            .birthday-main {
                font-size: clamp(2rem, 13vw, 3.5rem);
                margin-bottom: 12px;
            }

            /* Race number */
            .race-number {
                font-size: clamp(3.5rem, 22vw, 6rem);
            }

            .race-number-wrap {
                margin-bottom: 10px;
            }

            /* Name */
            .name-line {
                font-size: clamp(0.9rem, 5vw, 1.4rem);
                letter-spacing: 3px;
                margin-bottom: 6px;
            }

            /* Quote */
            .max-quote {
                font-size: 0.72rem;
                letter-spacing: 1px;
                margin-bottom: 25px;
                line-height: 1.6;
            }

            /* Podium — compact */
            .podium-row {
                gap: 6px;
                margin-bottom: 20px;
            }

            .podium-bar {
                width: clamp(44px, 12vw, 64px);
            }

            .podium-1 .podium-bar {
                height: clamp(44px, 10vw, 60px);
            }

            .podium-2 .podium-bar {
                height: clamp(32px, 8vw, 46px);
            }

            .podium-3 .podium-bar {
                height: clamp(24px, 6vw, 36px);
            }

            .podium-emoji {
                font-size: 1rem;
            }

            .podium-num {
                font-size: 0.65rem;
            }

            .podium-tag {
                font-size: 0.5rem;
                max-width: clamp(44px, 12vw, 64px);
            }

            /* CTA */
            .cta-btn {
                font-size: 0.6rem;
                padding: 13px 22px;
                letter-spacing: 2px;
                width: 90vw;
                max-width: 340px;
                justify-content: center;
            }
        }

        /* ── SHORT SCREENS (landscape phone, small viewports) ── */
        @media (max-height: 700px) {
            .scene {
                padding-top: 14px;
                padding-bottom: 18px;
            }

            .race-number {
                font-size: clamp(2.5rem, 12vw, 5rem);
            }

            .race-number-wrap {
                margin-bottom: 6px;
            }

            .birthday-main {
                font-size: clamp(1.8rem, 9vw, 3rem);
                margin-bottom: 4px;
            }

            .podium-row {
                margin-bottom: 14px;
            }

            .lap-badge {
                margin-bottom: 12px;
                padding: 5px 14px;
            }

            .team-badge {
                margin-bottom: 10px;
            }

            .flag-row {
                margin-bottom: 10px;
            }

            .max-quote {
                margin-bottom: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="stripe stripe-l"></div>
    <div class="stripe stripe-r"></div>

    <!-- Particle + Confetti Canvas -->
    <canvas id="bgCanvas"></canvas>

    <div class="scene">

        <!-- Top badge -->
        <div class="team-badge">🏁 &nbsp; FROM YOUR PIT CREW &nbsp; 🏁</div>

        <!-- Checkered flags row -->
        <div class="flag-row">
            <div class="checkered"></div>
            <span class="flag-label">RACE DAY &nbsp;|&nbsp; MARCH 3, 2026</span>
            <div class="checkered" style="animation-delay:0.3s"></div>
        </div>

        <!-- Race Telemetry Dashboard -->
        <div class="telemetry-dash">
            <div class="dash-main">
                <div class="dash-item">
                    <span class="dash-label">POS</span>
                    <span class="dash-value p1">P1</span>
                </div>
                <div class="dash-item" style="width: 1px; height: 20px; background: rgba(255,255,255,0.1);"></div>
                <div class="dash-item">
                    <span class="dash-label">LAP</span>
                    <span class="dash-value">26</span>
                </div>
            </div>
        </div>

        <!-- HAPPY BIRTHDAY heading -->
        <p class="birthday-pre">It's Race Day, Champion 🏆</p>
        <h1 class="birthday-main">
            <span class="happy">HAPPY</span>
            <span class="bday">BIRTHDAY</span>
        </h1>

        <!-- Race number -->
        <div class="race-number-wrap">
            <div class="race-number">26</div>
            <div class="race-number-label">LAPS OF LIFE</div>
        </div>

        <!-- Name -->
        <div class="name-line">NATASHA NIRANJAN</div>



        <!-- Max Verstappen quote -->
        <p class="max-quote">"Just like <span>MAX</span>, you're built for the podium."</p>

        <!-- Podium -->
        <div class="podium-row">
            <div class="podium-block podium-2">
                <div class="podium-emoji">🥈</div>
                <div class="podium-bar"><span class="podium-num">2</span></div>
                <div class="podium-tag">LAST YEAR</div>
            </div>
            <div class="podium-block podium-1">
                <div class="podium-emoji">🏆</div>
                <div class="podium-bar"><span class="podium-num">1</span></div>
                <div class="podium-tag">YOU AT 26</div>
            </div>
            <div class="podium-block podium-3">
                <div class="podium-emoji">🥉</div>
                <div class="podium-bar"><span class="podium-num">3</span></div>
                <div class="podium-tag">THE REST</div>
            </div>
        </div>

        <!-- CTA -->
        <div class="cta-wrap">
            <a href="portfolio.html" class="cta-btn" id="ctaBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
                ENTER THE PADDOCK
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </a>
        </div>



    </div><!-- /scene -->

    <script>
        (function () {
            "use strict";

            /* ─── CANVAS SETUP ─── */
            const canvas = document.getElementById("bgCanvas");
            const ctx = canvas.getContext("2d");
            let W = canvas.width = window.innerWidth;
            let H = canvas.height = window.innerHeight;
            window.addEventListener("resize", () => {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            });

            /* ─── CONFETTI / PARTICLES ─── */
            const COLORS = [
                "#dc0000", "#ff2d2d", "#ffd700", "#ffaa00",
                "#1e3a5f", "#4a90d9", "#ffffff", "#ff6600"
            ];

            class Confetti {
                constructor(burst) {
                    this.init(burst);
                }
                init(burst) {
                    if (burst) {
                        this.x = W / 2 + (Math.random() - 0.5) * W * 0.6;
                        this.y = -10;
                        this.vy = Math.random() * 4 + 2;
                    } else {
                        this.x = Math.random() * W;
                        this.y = Math.random() * H;
                        this.vy = Math.random() * 2 + 0.5;
                    }
                    this.vx = (Math.random() - 0.5) * 3;
                    this.size = Math.random() * 9 + 4;
                    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.15;
                    this.shape = Math.random() > 0.5 ? "rect" : "circle";
                    this.opacity = Math.random() * 0.7 + 0.3;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = Math.random() * 0.06 + 0.02;
                }
                update() {
                    this.wobble += this.wobbleSpeed;
                    this.x += this.vx + Math.sin(this.wobble) * 0.8;
                    this.y += this.vy;
                    this.rotation += this.rotationSpeed;
                    this.vy += 0.04; // gravity
                    if (this.y > H + 20) this.init(true);
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.fillStyle = this.color;
                    if (this.shape === "rect") {
                        ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
                    } else {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            /* ─── BACKGROUND STARS / SPARKS ─── */
            class Star {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.size = Math.random() * 1.5 + 0.3;
                    this.opacity = Math.random() * 0.4 + 0.05;
                    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
                    this.twinkle = Math.random() * Math.PI * 2;
                }
                update() {
                    this.twinkle += this.twinkleSpeed;
                }
                draw() {
                    ctx.globalAlpha = this.opacity * (0.6 + 0.4 * Math.sin(this.twinkle));
                    ctx.fillStyle = Math.random() > 0.7 ? "#ffd700" : "#ffffff";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            /* ─── FIREWORK ─── */
            class Firework {
                constructor() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H * 0.6;
                    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    this.particles = [];
                    const count = 28;
                    for (let i = 0; i < count; i++) {
                        const angle = (Math.PI * 2 / count) * i;
                        const speed = Math.random() * 4 + 2;
                        this.particles.push({
                            x: this.x, y: this.y,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            life: 1, decay: Math.random() * 0.015 + 0.008,
                            size: Math.random() * 3 + 1
                        });
                    }
                }
                update() {
                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.06;
                        p.vx *= 0.97;
                        p.vy *= 0.97;
                        p.life -= p.decay;
                    });
                    this.particles = this.particles.filter(p => p.life > 0);
                }
                draw() {
                    this.particles.forEach(p => {
                        ctx.save();
                        ctx.globalAlpha = p.life * 0.8;
                        ctx.fillStyle = this.color;
                        ctx.shadowColor = this.color;
                        ctx.shadowBlur = 8;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    });
                }
                isDead() { return this.particles.length === 0; }
            }

            /* ─── INIT ─── */
            const confetti = Array.from({ length: 120 }, () => new Confetti(false));
            const stars = Array.from({ length: 60 }, () => new Star());
            let fireworks = [];
            let fwTimer = 0;

            function loop() {
                ctx.clearRect(0, 0, W, H);

                // Radial background glow
                const grad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.4, W * 0.7);
                grad.addColorStop(0, "rgba(220,0,0,0.06)");
                grad.addColorStop(0.5, "rgba(30,58,95,0.04)");
                grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                stars.forEach(s => { s.update(); s.draw(); });
                ctx.globalAlpha = 1;

                confetti.forEach(c => { c.update(); c.draw(); });
                ctx.globalAlpha = 1;

                // Fireworks
                fwTimer++;
                if (fwTimer % 90 === 0) fireworks.push(new Firework());
                fireworks.forEach(f => { f.update(); f.draw(); });
                fireworks = fireworks.filter(f => !f.isDead());
                ctx.globalAlpha = 1;

                requestAnimationFrame(loop);
            }
            loop();

            /* ─── BURST CONFETTI ON LOAD ─── */
            setTimeout(() => {
                for (let i = 0; i < 60; i++) {
                    confetti.push(new Confetti(true));
                }
            }, 600);

            /* ─── SPARK BURST ON BUTTON CLICK ─── */
            function spawnSparks(cx, cy) {
                const n = 16;
                for (let i = 0; i < n; i++) {
                    const el = document.createElement("div");
                    el.style.cssText = `
                position:fixed;left:${cx}px;top:${cy}px;
                width:5px;height:5px;border-radius:50%;
                background:${Math.random() > 0.5 ? "#dc0000" : "#ffd700"};
                pointer-events:none;z-index:99999;
                box-shadow:0 0 8px ${Math.random() > 0.5 ? "#dc0000" : "#ffd700"};
            `;
                    document.body.appendChild(el);
                    const angle = (Math.PI * 2 / n) * i + Math.random() * 0.4;
                    const vel = 70 + Math.random() * 90;
                    let px = cx, py = cy, op = 1, fr = 0;
                    const vx = Math.cos(angle) * vel, vy = Math.sin(angle) * vel;
                    (function animate() {
                        fr++;
                        px += vx * 0.03; py += vy * 0.03 + fr * 0.12;
                        op -= 0.04;
                        el.style.left = px + "px"; el.style.top = py + "px";
                        el.style.opacity = op; el.style.transform = `scale(${op})`;
                        if (op > 0) requestAnimationFrame(animate); else el.remove();
                    })();
                }
            }

            const btn = document.getElementById("ctaBtn");
            btn.addEventListener("click", e => spawnSparks(e.clientX, e.clientY));
            btn.addEventListener("touchend", e => {
                const t = e.changedTouches[0];
                if (t) spawnSparks(t.clientX, t.clientY);
            }, { passive: true });

        })();
    </script>
</body>
